completions:
  - name: git branch
    patterns:
      - "^git (checkout|switch|merge|rebase|branch -[dD]) $"
    sourceCommand: "git branch --all | sed 's/^[* ]*//' | sed 's|remotes/origin/||' | sort -u"
    options:
      --prompt: "'Branch> '"

  - name: docker images
    patterns:
      - "^docker (run|rmi|tag|push|pull|save|inspect) $"
    sourceCommand: "docker images --format '{{.Repository}}:{{.Tag}}'"
    options:
      --prompt: "'Image> '"

  - name: docker containers
    patterns:
      - "^docker (stop|start|restart|rm|logs|exec|inspect|attach) $"
    sourceCommand: "docker ps -a --format '{{.Names}}'"
    options:
      --prompt: "'Container> '"

  - name: kubectl pods
    patterns:
      - "^kubectl (logs|describe pod|delete pod|exec) $"
    sourceCommand: "kubectl get pods --no-headers -o custom-columns=':metadata.name'"
    options:
      --prompt: "'Pod> '"

  - name: kubectl namespace
    patterns:
      - "^kubectl .+ (-n|--namespace) $"
    sourceCommand: "kubectl get namespaces -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\\n'"
    options:
      --prompt: "'Namespace> '"
