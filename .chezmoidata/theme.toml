# テーマの単一ソース。nvim (theme.lua.tmpl) / tmux (appearance.tmux.tmpl) / fzf (config.tmpl) に展開される
[theme]
name = "catppuccin"
variant = "latte"

# Catppuccin Latte (base/mantle は眩しさを抑えるため公式より二段暗い。Ghostty background と揃える)
[theme.palette]
base = "#dce0e8"
mantle = "#d3d8e2"
surface0 = "#ccd0da"
surface1 = "#bcc0cc"
overlay0 = "#9ca0b0"
text = "#4c4f69"
rosewater = "#dc8a78"
blue = "#1e66f5"
red = "#d20f39"
yellow = "#df8e1d"
green = "#40a02b"
sky = "#04a5e5"
mauve = "#8839ef"
peach = "#fe640b"
